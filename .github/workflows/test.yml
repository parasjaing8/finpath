name: Unit Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_e2e.py \
            -x \
            -v \
            --tb=short

      # E2E tests require a running server and ANTHROPIC_API_KEY.
      # They are intentionally excluded above and can be run manually with:
      #   RUN_E2E=1 ANTHROPIC_API_KEY=<key> python -m pytest tests/test_e2e.py -v
