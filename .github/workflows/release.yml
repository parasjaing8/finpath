name: Release

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0.1, v1.1.0, v2.0.0, etc.

jobs:
  build-and-release:
    name: Build APK & Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --no-coverage

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/finpath-release.keystore

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cat > android/keystore.properties <<EOF
          storeFile=finpath-release.keystore
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
          cd ..

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION=${GITHUB_REF_NAME}            # e.g. v1.0.1
          DEST="FinPath-${VERSION}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FinPath ${{ github.ref_name }}
          body: |
            ## FinPath ${{ github.ref_name }}

            Download the APK below and install it on your Android device,
            or upload it to Google Play Console.

            > **Play Store upload checklist**
            > 1. Run `npm run bump` and tag the commit before triggering this workflow
            > 2. Sign in to Play Console → Production → Create new release
            > 3. Upload `${{ steps.apk.outputs.name }}`
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
